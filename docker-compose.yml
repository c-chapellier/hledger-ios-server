version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hledger_api
    restart: always
    environment:
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI}
      SECRET_KEY: ${SECRET_KEY}
    # volumes:
    #   - repos:${REPOS_PATH}
    ports:
      - "8083:8000"

